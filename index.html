<!DOCTYPE html>
<html>
<head>
    <title>Skincare Ingredient Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Skincare Ingredient Analyzer</h1>
<p>Check if your skincare ingredients are safe for your skin type 💖</p>

    <textarea id="ingredients" placeholder="Paste ingredients here..."></textarea>

    <br><br>

    <select id="skinType">
    <option value="acne">Acne</option>
    <option value="oily">Oily</option>
    <option value="dry">Dry</option>
    <option value="sensitive">Sensitive</option>
</select>

    <button onclick="analyzeIngredients()">Analyze</button>

    <h2>Result:</h2>
    <div id="result"></div>

    <script src="script.js"></script>

</body>
</html>
