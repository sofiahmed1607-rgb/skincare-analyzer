<body>

<div class="container">

  <h1>✨ GlowCheck</h1>

  <div class="card">
    <h3>Ingredient Checker</h3>
    <textarea id="ingredients" placeholder="Enter ingredients..."></textarea>

    <select id="skinType">
      <option value="oily">Oily</option>
      <option value="dry">Dry</option>
      <option value="sensitive">Sensitive</option>
    </select>

    <button onclick="analyzeIngredients()">Analyze Ingredients</button>
  </div>

  <div class="card">
    <h3>Product Analyzer</h3>
    <input id="product" placeholder="Enter product name">

    <button onclick="analyzeProduct()">Analyze Product</button>
  </div>

  <div id="result"></div>

</div>
<script src="script.js"></script>

<link rel="stylesheet" href="style.css">
</body>
